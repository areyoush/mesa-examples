[work]
title = "GeoSIR Epidemics Model"

abstract = """
A geospatial agent-based implementation of a simple SIR epidemic model
demonstrating the capabilities of Mesa-Geo. Agents represent individuals
moving across a geographic map of Toronto, where infections spread through
proximity-based interactions. Neighborhood regions act as spatial units
that highlight infection hotspots during the simulation.
"""

doi = ""


