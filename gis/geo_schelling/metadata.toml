[work]
title = "GeoSchelling Model (Polygons)"

abstract = """
A geospatial adaptation of the Schelling segregation model implemented
using Mesa-Geo. Geographic regions (polygons) act as agents that evaluate
their neighborhood composition based on adjacent regions. If the ratio of
similar neighbors falls below a threshold, agents relocate to unoccupied
regions, producing emergent spatial segregation patterns.
"""

