[work]
title = "GeoSchelling Model (Points & Polygons)"

abstract = """
A geospatial implementation of the Schelling segregation model using
Mesa-Geo. Agents represent individuals residing within geographic regions
(polygons) and evaluate their satisfaction based on the demographic
composition of their region. Unhappy agents relocate to other regions,
demonstrating emergent segregation patterns across geographic boundaries.
"""

doi = ""


