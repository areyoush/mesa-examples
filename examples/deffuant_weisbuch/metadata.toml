[work]
title = "Deffuant–Weisbuch Bounded Confidence Model"

abstract = """
An agent-based implementation of the Deffuant–Weisbuch bounded confidence 
model of opinion dynamics. Agents hold continuous opinions and interact 
pairwise only if their opinions differ by less than a confidence threshold. 
Interactions lead to partial convergence of opinions, producing emergent 
patterns such as consensus, polarization, or fragmentation depending on 
model parameters.
"""

doi = "10.1142/S0219525900000078"


