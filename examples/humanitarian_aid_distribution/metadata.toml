[work]
title = "Humanitarian Aid Distribution Model (Needs-Based Architecture)"

abstract = """
An agent-based model of humanitarian aid distribution driven by a needs-based 
behavioral architecture. Beneficiary agents transition through urgency states 
based on dynamic food and water needs, while aid trucks implement a hybrid 
triage system balancing survival priority and logistical efficiency. The model 
demonstrates emergent coordination, resource competition, and system-level 
collapse under constrained humanitarian logistics.
"""

doi = "10.0000/example.humanitarian_aid.mesa"


[work.authorship]
authors = ["Model Authors (Mesa Implementation)"]


