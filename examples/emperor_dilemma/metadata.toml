[work]
title = "The Emperor's Dilemma Agent-Based Model"

abstract = """
An agent-based implementation of the Emperor's Dilemma model of 
self-enforcing social norms. The model demonstrates how unpopular norms 
can persist through public compliance and aggressive enforcement driven 
by reputational concerns. It captures dynamics of compliance, enforcement, 
and false enforcement, illustrating the emergence of an illusion of consensus 
in social systems.
"""

doi = "10.1086/427321"


