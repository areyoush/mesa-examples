[work]
title = "Boltzmann Wealth Model with Network"

abstract = """
An agent-based model of wealth exchange inspired by statistical mechanics. 
Agents begin with equal wealth and randomly transfer one unit of money to 
connected neighbors on a network grid. Over time, local exchanges produce 
an emergent, highly skewed wealth distribution, illustrating principles from 
econophysics and statistical equilibrium theory.
"""

doi = "10.0000/example.boltzmann_wealth_model_network.mesa"


[work.authorship]
authors = ["Mesa Development Team"]


